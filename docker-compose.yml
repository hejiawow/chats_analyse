version: "3.8"

services:
  redis:
    image: redis:7-alpine
    # 生产环境启用密码和 AOF 持久化（密码通过 REDIS_PASSWORD 环境变量传入）
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "127.0.0.1:6370:6379"
    volumes:
      - /data/redis:/data
    restart: always

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "127.0.0.1:5430:5432"
    environment:
      POSTGRES_DB: hujing_agent
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
    volumes:
      - /data/pg_data:/var/lib/postgresql/data
    restart: always

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    ports:
      - "127.0.0.1:8010:8000"
    env_file: .env
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      - redis
      - postgres
    restart: always

  worker:
    build: .
    command: sh -c "celery -A app.celery_app worker --loglevel=info --concurrency=10 & celery -A app.celery_app beat --loglevel=info"
    env_file: .env
    environment:
      - TZ=Asia/Shanghai
    depends_on:
      - redis
      - postgres
    restart: always
